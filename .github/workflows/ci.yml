name: CI

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint (syntax check)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate provider
        run: npm run validate:provider
